<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- <link rel="icon" type="image/svg+xml" href="/favicon.svg" /> -->

    <!-- All using the same file -->
<link rel="icon" type="image/png" sizes="32x32" href="/favicon.png" />
<link rel="icon" type="image/png" sizes="16x16" href="/favicon.png" />
<link rel="apple-touch-icon" sizes="180x180" href="/favicon.png" />
<link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Nelson Tour and Safari — World-class luxury safari experiences in Tanzania. Crafted by local experts for unforgettable adventures." />
    <title>Nelson Tour and Safari — Luxury Tanzania Experiences</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
    <script>
      (function() {
        var host = window.location.hostname;
        var path = window.location.pathname;
        var search = window.location.search;
        var url = 'https://nelsontoursandsafaris.com';

        // Railway staging → production
        if (host.indexOf('.up.railway.app') !== -1) {
          window.location.replace(url + path + search);
          return;
        }

        // www → non-www
        if (host === 'www.nelsontoursandsafaris.com') {
          window.location.replace(url + path + search);
          return;
        }

        // Force lowercase path
        if (path !== path.toLowerCase()) {
          window.location.replace(url + path.toLowerCase() + search);
          return;
        }

        // Remove trailing slash (except root)
        if (path.length > 1 && path.endsWith('/')) {
          window.location.replace(url + path.replace(/\/+$/, '') + search);
          return;
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script src="/config.js"></script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>

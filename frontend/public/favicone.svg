<?xml version="1.0" encoding="UTF-8"?>
<!-- 32×32 favicon — works as favicon.svg, scale to 16/32/48/64 -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32" role="img" aria-label="Nelson Tours and Safari Favicon">
  <defs>
    <linearGradient id="fmtn" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#b8ccd5"/>
      <stop offset="100%" stop-color="#607a6a"/>
    </linearGradient>
  </defs>

  <!-- Dark green background square (for contrast on any bg) -->
  <rect width="32" height="32" rx="5" fill="#0f3d1e"/>

  <!-- Mountain -->
  <path d="M 2,26 L 8,12 Q 11,7 16,6 Q 21,7 24,12 L 30,26 Z"
        fill="url(#fmtn)"/>
  <!-- Snow cap -->
  <path d="M 12,15 L 14,9 Q 16,6 16,6 Q 16,6 18,9 L 20,15 Q 18,17 16,18 Q 14,17 12,15 Z"
        fill="#f0f5f8"/>
  <!-- Ice field -->
  <path d="M 12,15 Q 14,17 16,18 Q 18,17 20,15 Q 18,20 16,21 Q 14,20 12,15 Z"
        fill="#c5d8e2" opacity="0.9"/>

  <!-- Green hills -->
  <path d="M 2,24 Q 6,21 10,23 Q 14,25 18,23 Q 22,21 26,23 Q 29,24 30,25 L 30,27 L 2,27 Z"
        fill="#226030"/>
  <!-- Ground -->
  <path d="M 2,26 L 30,26 L 30,29 Q 16,31 2,29 Z"
        fill="#164820"/>

  <!-- Elephant (right, simplified) -->
  <ellipse cx="24" cy="22" rx="5" ry="3.5" fill="#7a9090"/>
  <ellipse cx="19.5" cy="20.5" rx="3" ry="2.8" fill="#7a9090"/>
  <path d="M 17,21 Q 15,22 15,24 Q 15,26 16.5,26 Q 17.5,25 17,23 Q 17.5,21 19,20"
        fill="none" stroke="#7a9090" stroke-width="1.8" stroke-linecap="round"/>
  <rect x="19" y="24.5" width="2" height="2.5" rx="0.8" fill="#607878"/>
  <rect x="22" y="24.5" width="2" height="2.5" rx="0.8" fill="#607878"/>
  <rect x="25" y="24.5" width="2" height="2.5" rx="0.8" fill="#607878"/>

  <!-- Car (left, simplified) -->
  <path d="M 3,27 L 3,23 Q 4,21 5.5,21 L 12,21 Q 13.5,21 14,23 L 14.5,27 Z" fill="#4a7820"/>
  <path d="M 5.5,21 L 6,19 L 12,19 L 13,21 Z" fill="#386018"/>
  <path d="M 6,21 L 6.2,19.2 L 9.5,19.2 L 9.5,21 Z" fill="#88b4c5" opacity="0.9"/>
  <path d="M 10,21 L 10,19.2 L 12.5,19.2 L 12.8,21 Z" fill="#88b4c5" opacity="0.9"/>
  <circle cx="6" cy="27" r="2" fill="#222"/>
  <circle cx="12" cy="27" r="2" fill="#222"/>

  <!-- Gold accent line at bottom -->
  <rect x="2" y="29.5" width="28" height="0.8" rx="0.4" fill="#c9a96e" opacity="0.6"/>
</svg>

<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 70" width="380" height="70" role="img" aria-label="Nelson Tours and Safari">
  <defs>
    <linearGradient id="hmtnGrad" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#b8ccd5"/>
      <stop offset="35%" stop-color="#8fa4ae"/>
      <stop offset="100%" stop-color="#5e7868"/>
    </linearGradient>
    <linearGradient id="hhillGrad" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#3a9048"/>
      <stop offset="100%" stop-color="#1c5625"/>
    </linearGradient>
    <linearGradient id="hnelsonGrad" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#1e6835"/>
      <stop offset="100%" stop-color="#0a2e14"/>
    </linearGradient>
    <clipPath id="hIconClip">
      <rect x="4" y="4" width="62" height="62" rx="8"/>
    </clipPath>
  </defs>

  <!-- ════════════════════════════════ -->
  <!-- ICON BADGE (left, 70×70)        -->
  <!-- ════════════════════════════════ -->
  <!-- Icon badge border (transparent fill — enables CSS invert for dark-bg navbar) -->
  <rect x="4" y="4" width="62" height="62" rx="8" fill="none" stroke="#1e5228" stroke-width="1.5"/>

  <!-- Mountain body -->
  <path d="M 8,52 L 22,24 Q 28,15 35,13 Q 42,15 48,24 L 62,52 Z"
        fill="url(#hmtnGrad)" clip-path="url(#hIconClip)"/>
  <!-- Snow cap -->
  <path d="M 28,28 L 32,19 Q 35,13 35,13 Q 35,13 38,19 L 42,28 Q 39,32 35,33 Q 31,32 28,28 Z"
        fill="#f0f5f8"/>
  <!-- Snow ice field -->
  <path d="M 28,28 Q 31,32 35,33 Q 39,32 42,28 Q 40,36 35,38 Q 30,36 28,28 Z"
        fill="#c5d8e2" opacity="0.9"/>
  <!-- Green lower slopes -->
  <path d="M 12,52 Q 20,44 35,42 Q 50,44 58,52 Z" fill="#3a7840" opacity="0.7"/>
  <!-- Green hills -->
  <path d="M 6,50 Q 12,45 18,47 Q 25,49 31,46 Q 35,44 39,46 Q 45,49 52,47 Q 58,45 64,50 L 64,55 L 6,55 Z"
        fill="url(#hhillGrad)"/>
  <!-- Ground -->
  <path d="M 5,53 L 65,53 L 65,58 Q 35,60 5,58 Z" fill="#1a5222"/>

  <!-- River path (center) -->
  <path d="M 32,58 Q 29,54 27,50 Q 25,46 26,42 Q 27,39 32,37 Q 33,39 38,37 Q 43,39 44,42 Q 45,46 43,50 Q 41,54 38,58 Z"
        fill="#5aaebc" opacity="0.85"/>

  <!-- Acacia tree (left) -->
  <rect x="14" y="44" width="2.5" height="10" rx="1" fill="#5c3c1c"/>
  <path d="M 8,42 Q 12,37 15,36 Q 16,36 18,37 Q 20,36 24,37 Q 27,40 25,44 Q 20,47 15,47 Q 10,45 8,42 Z" fill="#1a5022"/>
  <path d="M 10,40 Q 14,36 15,35 Q 16,35 18,36 Q 21,37 24,40 Q 20,42 15,42 Q 11,41 10,40 Z" fill="#2e7a38"/>

  <!-- Elephant (right, tiny) -->
  <!-- Body -->
  <ellipse cx="53" cy="47" rx="9" ry="6.5" fill="#6a7c7c"/>
  <!-- Head -->
  <ellipse cx="44" cy="44" rx="5" ry="4.5" fill="#6a7c7c"/>
  <!-- Ear -->
  <path d="M 44,40 Q 48,38 51,40 Q 53,43 51,46 Q 48,47 46,45 Q 49,44 50,42 Q 49,40 46,40 Z" fill="#7c9090"/>
  <!-- Trunk -->
  <path d="M 40,45 Q 37,47 36,50 Q 36,53 38,53 Q 40,52 39,50 Q 39,47 41,44"
        fill="none" stroke="#6a7c7c" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Tusk -->
  <path d="M 40,45 Q 37,46 36,49 Q 36,51 38,52"
        fill="none" stroke="#e0d8c0" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Legs -->
  <rect x="44" y="52" width="3" height="4" rx="1" fill="#5a6c6c"/>
  <rect x="49" y="52" width="3" height="4" rx="1" fill="#5a6c6c"/>
  <rect x="55" y="52" width="3" height="4" rx="1" fill="#5a6c6c"/>
  <rect x="59" y="52" width="3" height="4" rx="1" fill="#5a6c6c"/>

  <!-- Land Cruiser (left of river) -->
  <path d="M 10,56 L 10,50 Q 11,46 14,46 L 27,46 Q 30,46 31,50 L 32,56 Z" fill="#4a7820"/>
  <path d="M 14,46 L 15,42 L 27,42 L 29,46 Z" fill="#386018"/>
  <rect x="15" y="41" width="13" height="1.5" rx="0.5" fill="#264010"/>
  <path d="M 15,46 L 16,43 L 22,43 L 22,46 Z" fill="#88b4c5" opacity="0.9"/>
  <path d="M 23,46 L 23,43 L 28,43 L 29,46 Z" fill="#88b4c5" opacity="0.9"/>
  <circle cx="15" cy="57" r="3.5" fill="#1a1a1a"/>
  <circle cx="15" cy="57" r="2" fill="#444"/>
  <circle cx="27" cy="57" r="3.5" fill="#1a1a1a"/>
  <circle cx="27" cy="57" r="2" fill="#444"/>

  <!-- ════════════════════════════════ -->
  <!-- TEXT (right of icon)            -->
  <!-- ════════════════════════════════ -->
  <!-- NELSON -->
  <text x="80" y="40"
        font-family="Georgia, 'Palatino Linotype', serif"
        font-size="30" font-weight="900" text-anchor="start"
        fill="url(#hnelsonGrad)" letter-spacing="2">NELSON</text>

  <!-- Divider line -->
  <line x1="80" y1="48" x2="372" y2="48" stroke="#c9a96e" stroke-width="0.8" opacity="0.8"/>

  <!-- TOURS & SAFARI -->
  <text x="80" y="62"
        font-family="'Arial', 'Helvetica Neue', Helvetica, sans-serif"
        font-size="14" font-weight="600" text-anchor="start"
        fill="#3a3a3a" letter-spacing="5">TOURS &amp; SAFARI</text>
</svg>

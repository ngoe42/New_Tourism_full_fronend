<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" width="800" height="420" role="img" aria-label="Nelson Tours and Safari Logo">
  <defs>
    <!-- Mountain gradient -->
    <linearGradient id="mtnGrad" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#c0cdd5"/>
      <stop offset="30%" stop-color="#8fa4ae"/>
      <stop offset="100%" stop-color="#617a68"/>
    </linearGradient>
    <!-- Green hill gradient -->
    <linearGradient id="hillGrad" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#3a9048"/>
      <stop offset="100%" stop-color="#1c5625"/>
    </linearGradient>
    <!-- Ground gradient -->
    <linearGradient id="groundGrad" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#1a5222"/>
      <stop offset="100%" stop-color="#0f3a18"/>
    </linearGradient>
    <!-- River gradient -->
    <linearGradient id="riverGrad" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#6ab8cc"/>
      <stop offset="100%" stop-color="#4898aa"/>
    </linearGradient>
    <!-- NELSON text gradient -->
    <linearGradient id="nelsonGrad" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#1e6835"/>
      <stop offset="100%" stop-color="#0a2e14"/>
    </linearGradient>
    <!-- Car body gradient -->
    <linearGradient id="carGrad" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#5a8830"/>
      <stop offset="100%" stop-color="#3a6018"/>
    </linearGradient>
  </defs>

  <!-- ═══════════════════════════════════════ -->
  <!-- MOUNTAIN (Kilimanjaro)                  -->
  <!-- ═══════════════════════════════════════ -->
  <!-- Mountain body -->
  <path d="M 148,228 L 272,88 Q 318,46 370,34 Q 400,26 430,34 Q 482,46 528,88 L 652,228 Z"
        fill="url(#mtnGrad)"/>
  <!-- Left slope shadow -->
  <path d="M 148,228 L 272,88 Q 295,72 318,64 Q 298,96 294,130 Q 290,165 298,192 Q 262,210 225,225 Z"
        fill="#6a8898" opacity="0.3"/>
  <!-- Right slope highlight -->
  <path d="M 652,228 L 528,88 Q 505,72 482,64 Q 502,98 506,132 Q 510,168 502,194 Q 538,212 575,225 Z"
        fill="#d8e4e8" opacity="0.2"/>
  <!-- Lower green slopes -->
  <path d="M 192,228 Q 268,190 345,184 Q 380,181 400,179 Q 420,181 455,184 Q 532,190 608,228 Z"
        fill="#3a7840" opacity="0.65"/>
  <!-- Snow cap (white) -->
  <path d="M 336,96 L 362,56 Q 386,32 400,28 Q 414,32 438,56 L 464,96 Q 444,110 420,114 Q 408,116 400,114 Q 392,116 380,114 Q 356,110 336,96 Z"
        fill="#f2f6f8"/>
  <!-- Snow ice-field below cap -->
  <path d="M 336,96 Q 356,110 380,114 Q 392,116 400,114 Q 408,116 420,114 Q 444,110 464,96 Q 448,122 424,128 Q 410,132 400,130 Q 390,132 376,128 Q 352,122 336,96 Z"
        fill="#c8d8e0" opacity="0.85"/>

  <!-- ═══════════════════════════════════════ -->
  <!-- GREEN HILLS / TERRAIN                   -->
  <!-- ═══════════════════════════════════════ -->
  <path d="M 62,222 Q 110,198 162,207 Q 206,214 252,203 Q 296,192 342,196 Q 376,199 400,195 Q 424,199 458,196 Q 504,192 548,203 Q 594,214 638,207 Q 690,198 738,222 L 738,234 L 62,234 Z"
        fill="url(#hillGrad)"/>

  <!-- ═══════════════════════════════════════ -->
  <!-- GROUND BASE                             -->
  <!-- ═══════════════════════════════════════ -->
  <path d="M 52,226 L 748,226 L 748,244 Q 620,256 400,258 Q 180,256 52,244 Z"
        fill="url(#groundGrad)"/>

  <!-- ═══════════════════════════════════════ -->
  <!-- RIVER / WINDING PATH                    -->
  <!-- ═══════════════════════════════════════ -->
  <path d="M 388,258 Q 376,242 370,226 Q 364,208 368,193 Q 372,178 380,166 Q 390,155 400,152 Q 410,155 420,166 Q 428,178 432,193 Q 436,208 430,226 Q 424,242 412,258 Z"
        fill="url(#riverGrad)" opacity="0.88"/>
  <!-- River left highlight -->
  <path d="M 388,258 Q 378,240 374,224 Q 370,208 374,194 Q 377,181 385,169 L 388,165 Q 385,178 382,194 Q 380,210 382,226 Q 384,242 390,256 Z"
        fill="white" opacity="0.28"/>

  <!-- ═══════════════════════════════════════ -->
  <!-- ACACIA TREE                             -->
  <!-- ═══════════════════════════════════════ -->
  <!-- Trunk -->
  <path d="M 181,226 L 179,198 Q 180,186 184,186 Q 188,186 188,198 L 187,226 Z" fill="#5c3c1c"/>
  <!-- Branch hint left -->
  <path d="M 182,204 Q 172,196 166,192" fill="none" stroke="#5c3c1c" stroke-width="3" stroke-linecap="round"/>
  <!-- Branch hint right -->
  <path d="M 185,208 Q 196,200 202,196" fill="none" stroke="#5c3c1c" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Canopy back layer (darkest) -->
  <path d="M 118,172 Q 140,152 164,147 Q 184,143 184,145 Q 184,143 204,147 Q 228,152 255,170 Q 240,182 215,186 Q 196,189 184,187 Q 172,189 152,186 Q 130,182 118,172 Z"
        fill="#1a5022"/>
  <!-- Canopy mid layer -->
  <path d="M 126,167 Q 150,150 174,146 Q 184,144 194,146 Q 218,150 244,165 Q 230,175 208,179 Q 194,182 184,180 Q 174,182 160,179 Q 138,175 126,167 Z"
        fill="#276830"/>
  <!-- Canopy front layer (brightest) -->
  <path d="M 136,162 Q 158,148 178,144 Q 184,143 190,144 Q 210,148 232,162 Q 220,170 202,174 Q 192,176 184,174 Q 176,176 163,174 Q 148,170 136,162 Z"
        fill="#348040"/>
  <!-- Canopy highlight top -->
  <path d="M 150,157 Q 166,148 184,145 Q 202,148 218,157 Q 202,153 184,151 Q 166,153 150,157 Z"
        fill="#42a050" opacity="0.7"/>

  <!-- ═══════════════════════════════════════ -->
  <!-- LAND CRUISER (facing right)             -->
  <!-- ═══════════════════════════════════════ -->
  <!-- Drop shadow -->
  <ellipse cx="158" cy="231" rx="74" ry="5" fill="#071808" opacity="0.3"/>
  <!-- Car body -->
  <path d="M 83,228 L 83,205 Q 88,190 110,188 L 200,188 Q 220,188 228,202 L 232,228 Z"
        fill="url(#carGrad)"/>
  <!-- Roof/cab -->
  <path d="M 112,188 L 114,173 L 202,173 L 210,188 Z"
        fill="#385c18"/>
  <!-- Roof rack -->
  <rect x="116" y="170" width="85" height="4" rx="1" fill="#264010"/>
  <!-- Roof rack crossbars -->
  <line x1="141" y1="170" x2="141" y2="174" stroke="#1a2e0c" stroke-width="1.5"/>
  <line x1="163" y1="170" x2="163" y2="174" stroke="#1a2e0c" stroke-width="1.5"/>
  <line x1="185" y1="170" x2="185" y2="174" stroke="#1a2e0c" stroke-width="1.5"/>
  <!-- Window rear -->
  <path d="M 116,188 L 118,175 L 156,175 L 156,188 Z" fill="#8ab8cc" opacity="0.88"/>
  <!-- Window front -->
  <path d="M 160,188 L 160,175 L 202,175 L 206,188 Z" fill="#8ab8cc" opacity="0.88"/>
  <!-- Window divider pillar -->
  <rect x="155" y="173" width="5" height="15" fill="#2d4e10"/>
  <!-- Front hood/cowl slope -->
  <path d="M 228,202 L 235,202 L 235,218 Q 235,226 228,228 Z" fill="#4a7420"/>
  <!-- Front grille/bumper -->
  <rect x="233" y="210" width="4" height="12" rx="1" fill="#1e3010" opacity="0.85"/>
  <!-- Headlight -->
  <rect x="229" y="206" width="6" height="7" rx="1.5" fill="#ffe870"/>
  <!-- Rear light -->
  <rect x="82" y="207" width="5" height="8" rx="1" fill="#cc2020" opacity="0.8"/>
  <!-- Body stripe detail -->
  <line x1="88" y1="208" x2="228" y2="208" stroke="#3a6018" stroke-width="1.5" opacity="0.5"/>
  <!-- Wheel arches -->
  <path d="M 98,228 Q 120,214 142,228" fill="#4a7420" stroke="#385c18" stroke-width="1"/>
  <path d="M 185,228 Q 207,214 229,228" fill="#4a7420" stroke="#385c18" stroke-width="1"/>
  <!-- Wheels -->
  <circle cx="120" cy="228" r="15" fill="#1a1a1a"/>
  <circle cx="120" cy="228" r="10" fill="#3a3a3a"/>
  <circle cx="120" cy="228" r="4.5" fill="#666"/>
  <circle cx="207" cy="228" r="15" fill="#1a1a1a"/>
  <circle cx="207" cy="228" r="10" fill="#3a3a3a"/>
  <circle cx="207" cy="228" r="4.5" fill="#666"/>

  <!-- ═══════════════════════════════════════ -->
  <!-- ELEPHANT (facing left)                  -->
  <!-- ═══════════════════════════════════════ -->
  <!-- Drop shadow -->
  <ellipse cx="603" cy="252" rx="80" ry="6" fill="#071808" opacity="0.28"/>
  <!-- Main body -->
  <ellipse cx="612" cy="206" rx="70" ry="48" fill="#6a7c7c"/>
  <!-- Head -->
  <ellipse cx="548" cy="184" rx="35" ry="32" fill="#6a7c7c"/>
  <!-- Neck connection (blend head to body) -->
  <ellipse cx="580" cy="192" rx="30" ry="22" fill="#6a7c7c"/>
  <!-- Ear (large, prominent left ear) -->
  <path d="M 558,163 Q 580,148 604,148 Q 624,149 640,160 Q 654,172 652,188 Q 648,204 634,210 Q 620,214 608,207 Q 616,205 628,200 Q 640,192 640,180 Q 638,168 626,161 Q 614,156 600,158 Q 588,160 578,170 Z"
        fill="#7c9090"/>
  <!-- Ear inner fold -->
  <path d="M 578,170 Q 588,160 600,158 Q 614,156 626,161 Q 638,168 640,180 Q 640,192 628,200 Q 616,205 608,207 Q 620,200 630,193 Q 638,184 636,174 Q 632,163 620,158 Q 608,155 596,160 Q 585,165 578,175 Z"
        fill="#6a7c7c" opacity="0.8"/>
  <!-- Body top highlight -->
  <path d="M 548,168 Q 580,155 620,158 Q 650,163 665,178 Q 645,166 612,164 Q 580,163 550,174 Z"
        fill="#7c9090" opacity="0.55"/>
  <!-- Trunk -->
  <path d="M 522,192 Q 508,205 505,220 Q 502,234 510,240 Q 518,242 522,234 Q 524,222 520,210 Q 518,198 526,184 Q 534,172 544,166"
        fill="none" stroke="#6a7c7c" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Trunk inner lighter tone -->
  <path d="M 522,192 Q 510,205 507,220 Q 505,232 512,238"
        fill="none" stroke="#7c9090" stroke-width="9" stroke-linecap="round" opacity="0.65"/>
  <!-- Tusk -->
  <path d="M 541,174 Q 524,181 516,192 Q 510,202 515,210"
        fill="none" stroke="#e8e0c5" stroke-width="5.5" stroke-linecap="round"/>
  <!-- Eye -->
  <circle cx="562" cy="175" r="5" fill="#182020"/>
  <circle cx="563" cy="174" r="2" fill="white"/>
  <!-- Legs -->
  <rect x="550" y="246" width="19" height="20" rx="5" fill="#5a6c6c"/>
  <rect x="574" y="248" width="19" height="18" rx="5" fill="#5a6c6c"/>
  <rect x="614" y="246" width="19" height="20" rx="5" fill="#5a6c6c"/>
  <rect x="638" y="246" width="19" height="18" rx="5" fill="#5a6c6c"/>
  <!-- Hoof pads -->
  <rect x="550" y="262" width="19" height="4" rx="2" fill="#404c4c"/>
  <rect x="574" y="262" width="19" height="4" rx="2" fill="#404c4c"/>
  <rect x="614" y="262" width="19" height="4" rx="2" fill="#404c4c"/>
  <rect x="638" y="262" width="19" height="4" rx="2" fill="#404c4c"/>
  <!-- Tail -->
  <path d="M 678,192 Q 692,200 689,216 Q 687,225 681,222"
        fill="none" stroke="#5a6c6c" stroke-width="3.5" stroke-linecap="round"/>

  <!-- ═══════════════════════════════════════ -->
  <!-- GROUND SHADOW ELLIPSE                   -->
  <!-- ═══════════════════════════════════════ -->
  <ellipse cx="400" cy="246" rx="355" ry="9" fill="#061410" opacity="0.18"/>

  <!-- ═══════════════════════════════════════ -->
  <!-- TYPOGRAPHY                              -->
  <!-- ═══════════════════════════════════════ -->
  <!-- NELSON -->
  <text x="400" y="340"
        font-family="Georgia, 'Palatino Linotype', 'Book Antiqua', serif"
        font-size="92" font-weight="900" text-anchor="middle"
        fill="url(#nelsonGrad)" letter-spacing="4">NELSON</text>

  <!-- Decorative side lines -->
  <line x1="180" y1="364" x2="274" y2="364" stroke="#333" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="526" y1="364" x2="620" y2="364" stroke="#333" stroke-width="1.5" stroke-linecap="round"/>

  <!-- TOURS & SAFARI -->
  <text x="400" y="372"
        font-family="'Arial', 'Helvetica Neue', Helvetica, sans-serif"
        font-size="23" font-weight="600" text-anchor="middle"
        fill="#2c2c2c" letter-spacing="6">TOURS &amp; SAFARI</text>
</svg>

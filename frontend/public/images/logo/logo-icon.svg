<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120" role="img" aria-label="Nelson Tours and Safari Icon">
  <defs>
    <linearGradient id="imtnGrad" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#b8ccd5"/>
      <stop offset="35%" stop-color="#8fa4ae"/>
      <stop offset="100%" stop-color="#5e7868"/>
    </linearGradient>
    <linearGradient id="ihillGrad" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#3a9048"/>
      <stop offset="100%" stop-color="#1c5625"/>
    </linearGradient>
    <linearGradient id="ibgGrad" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#faf8f3"/>
      <stop offset="100%" stop-color="#f0ede4"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="60" cy="60" r="58" fill="url(#ibgGrad)"/>
  <circle cx="60" cy="60" r="58" fill="none" stroke="#1e5228" stroke-width="2.5"/>

  <!-- ═══════════════════ -->
  <!-- MOUNTAIN            -->
  <!-- ═══════════════════ -->
  <!-- Mountain body -->
  <path d="M 10,88 L 30,40 Q 38,26 48,22 Q 60,17 72,22 Q 82,26 90,40 L 110,88 Z"
        fill="url(#imtnGrad)"/>
  <!-- Left shadow -->
  <path d="M 10,88 L 30,40 Q 36,32 43,28 Q 38,44 37,58 Q 36,70 40,80 Q 26,85 14,88 Z"
        fill="#6a8898" opacity="0.28"/>
  <!-- Right highlight -->
  <path d="M 110,88 L 90,40 Q 84,32 77,28 Q 82,44 83,58 Q 84,70 80,80 Q 94,85 106,88 Z"
        fill="#d8e4e8" opacity="0.22"/>
  <!-- Lower green slopes -->
  <path d="M 18,88 Q 36,74 60,71 Q 84,74 102,88 Z"
        fill="#3a7840" opacity="0.7"/>
  <!-- Snow cap -->
  <path d="M 48,46 L 54,30 Q 58,19 60,17 Q 62,19 66,30 L 72,46 Q 66,52 60,54 Q 54,52 48,46 Z"
        fill="#f0f5f8"/>
  <!-- Ice field -->
  <path d="M 48,46 Q 54,52 60,54 Q 66,52 72,46 Q 68,58 60,60 Q 52,58 48,46 Z"
        fill="#c5d8e2" opacity="0.88"/>

  <!-- ═══════════════════ -->
  <!-- TERRAIN & GROUND   -->
  <!-- ═══════════════════ -->
  <!-- Rolling hills -->
  <path d="M 8,84 Q 18,78 28,81 Q 38,84 48,80 Q 60,77 72,80 Q 82,84 92,81 Q 102,78 112,84 L 112,90 L 8,90 Z"
        fill="url(#ihillGrad)"/>
  <!-- Ground strip -->
  <path d="M 7,87 L 113,87 L 113,95 Q 60,100 7,95 Z"
        fill="#1a5222"/>

  <!-- River -->
  <path d="M 56,95 Q 52,90 50,85 Q 48,80 50,75 Q 53,71 60,70 Q 67,71 70,75 Q 72,80 70,85 Q 68,90 64,95 Z"
        fill="#5aaebc" opacity="0.85"/>
  <!-- River highlight -->
  <path d="M 56,95 Q 53,89 52,84 Q 51,79 53,74 L 54,72 Q 53,78 53,84 Q 53,90 55,95 Z"
        fill="white" opacity="0.3"/>

  <!-- ═══════════════════ -->
  <!-- ACACIA TREE (left) -->
  <!-- ═══════════════════ -->
  <!-- Trunk -->
  <rect x="27" y="78" width="3.5" height="13" rx="1" fill="#5c3c1c"/>
  <!-- Canopy back -->
  <path d="M 16,74 Q 20,67 27,65 Q 28,65 29,65 Q 30,65 36,65 Q 42,67 46,73 Q 40,77 35,79 Q 29,80 24,79 Q 19,77 16,74 Z"
        fill="#1a5022"/>
  <!-- Canopy front -->
  <path d="M 18,72 Q 22,66 29,64 Q 36,66 42,72 Q 37,75 29,77 Q 21,75 18,72 Z"
        fill="#2e7a38"/>
  <!-- Canopy highlight -->
  <path d="M 21,70 Q 25,65 29,64 Q 33,65 37,70 Q 33,67 29,66 Q 25,67 21,70 Z"
        fill="#42a050" opacity="0.65"/>

  <!-- ═══════════════════ -->
  <!-- LAND CRUISER        -->
  <!-- ═══════════════════ -->
  <!-- Car body -->
  <path d="M 13,93 L 13,85 Q 14,80 18,79 L 36,79 Q 40,79 42,84 L 43,93 Z"
        fill="#4a7820"/>
  <!-- Roof -->
  <path d="M 18,79 L 19,74 L 36,74 L 38,79 Z" fill="#386018"/>
  <!-- Roof rack -->
  <rect x="19" y="73" width="17" height="2" rx="0.5" fill="#264010"/>
  <!-- Windows -->
  <path d="M 19,79 L 20,75 L 29,75 L 29,79 Z" fill="#88b4c5" opacity="0.9"/>
  <path d="M 30,79 L 30,75 L 36,75 L 37,79 Z" fill="#88b4c5" opacity="0.9"/>
  <!-- Headlight -->
  <rect x="41" y="82" width="2.5" height="3.5" rx="0.5" fill="#ffe870"/>
  <!-- Wheels -->
  <circle cx="19" cy="93" r="5" fill="#1a1a1a"/>
  <circle cx="19" cy="93" r="3" fill="#3a3a3a"/>
  <circle cx="36" cy="93" r="5" fill="#1a1a1a"/>
  <circle cx="36" cy="93" r="3" fill="#3a3a3a"/>

  <!-- ═══════════════════ -->
  <!-- ELEPHANT (right)   -->
  <!-- ═══════════════════ -->
  <!-- Body -->
  <ellipse cx="88" cy="85" rx="18" ry="12.5" fill="#6a7c7c"/>
  <!-- Head -->
  <ellipse cx="72" cy="80" rx="10" ry="9" fill="#6a7c7c"/>
  <!-- Neck blend -->
  <ellipse cx="81" cy="81" rx="9" ry="7" fill="#6a7c7c"/>
  <!-- Ear -->
  <path d="M 71,72 Q 78,68 85,70 Q 91,73 91,80 Q 89,86 83,87 Q 78,87 76,84 Q 81,83 84,80 Q 85,76 82,73 Q 78,71 73,73 Z"
        fill="#7c9090"/>
  <!-- Ear inner -->
  <path d="M 73,73 Q 78,71 82,73 Q 85,76 84,80 Q 81,83 76,84 Q 79,81 80,78 Q 80,75 78,73 Q 76,72 73,73 Z"
        fill="#6a7c7c" opacity="0.8"/>
  <!-- Body highlight -->
  <path d="M 72,73 Q 82,69 92,72 Q 98,76 100,82 Q 94,76 88,74 Q 80,72 73,76 Z"
        fill="#7c9090" opacity="0.5"/>
  <!-- Trunk -->
  <path d="M 64,82 Q 59,86 58,91 Q 58,95 61,96 Q 64,96 64,92 Q 63,88 65,84 Q 67,79 71,76"
        fill="none" stroke="#6a7c7c" stroke-width="4.5" stroke-linecap="round"/>
  <!-- Trunk highlight -->
  <path d="M 64,82 Q 60,86 59,91 Q 59,94 61,95"
        fill="none" stroke="#7c9090" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
  <!-- Tusk -->
  <path d="M 63,83 Q 59,85 57,90 Q 57,93 60,94"
        fill="none" stroke="#e0d8c0" stroke-width="2" stroke-linecap="round"/>
  <!-- Eye -->
  <circle cx="66" cy="76" r="2" fill="#182020"/>
  <circle cx="66.5" cy="75.5" r="0.8" fill="white"/>
  <!-- Legs -->
  <rect x="70" y="93" width="6" height="8" rx="2" fill="#5a6c6c"/>
  <rect x="78" y="94" width="6" height="7" rx="2" fill="#5a6c6c"/>
  <rect x="88" y="93" width="6" height="8" rx="2" fill="#5a6c6c"/>
  <rect x="96" y="94" width="6" height="7" rx="2" fill="#5a6c6c"/>
  <!-- Tail -->
  <path d="M 103,78 Q 108,82 107,88 Q 106,92 103,91"
        fill="none" stroke="#5a6c6c" stroke-width="1.8" stroke-linecap="round"/>

  <!-- ═══════════════════ -->
  <!-- "NS" MONOGRAM       -->
  <!-- ═══════════════════ -->
  <!-- Optional: tiny brand letters for favicon recognisability -->
</svg>
